<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In / Log In</title>
    <style>
      html,
      body {
        width: 100vw;
        height: 100vh;
        margin: 0;
        padding: 0;
        font-family: Arial, Helvetica, sans-serif;
        overflow-x: hidden;
      }
      .banner img{
        width: 100vw;
        height: 100vh;
        position: absolute;
        z-index: -1;
      }
      .info-box {
        position: absolute;
        left: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        width: 300px;
        height: 100%;
        background: rgba(0, 0, 0, 0.2);
        backdrop-filter: blur(15px), saturate(150%);
        z-index: 10;
        box-shadow: 1px 1px 12px rgb(255, 255, 255);
      }

      .input-group {
        position: relative;
        margin-bottom: 30px;
      }

      .input-group input {
        font-size: 16px;
        padding: 10px 0;
        display: block;
        width: 100%;
        border: none;
        border-bottom: 1px solid #ccc;
        background: transparent;
        outline: none;
      }

      .input-group label {
        color: #000000;
        font-size: 14px;
        position: absolute;
        pointer-events: none;
        left: 0;
        top: 10px;
        transition: 0.3s ease all;
      }

      .input-group input:focus ~ label,
      .input-group input:valid ~ label {
        top: -15px;
        font-size: 12px;
        color: #000;
        letter-spacing: 1px;
      }

      .input-group .bar {
        position: relative;
        display: block;
        width: 100%;
      }

      .input-group .bar:before {
        content: "";
        height: 2px;
        width: 0;
        bottom: 0;
        position: absolute;
        background: #000;
        transition: 0.4s ease all;
        left: 50%;
        transform: translateX(-50%);
      }

      .input-group input:focus ~ .bar:before {
        width: 100%;
      }
      .Create-Account {
        background: transparent;
        color: #000;
        border: 1px solid #000;
        padding: 15px 40px;
        font-family: "Montserrat", sans-serif;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 3px;
        cursor: pointer;
        transition: all 0.4s ease;
        position: relative;
        overflow: hidden;
      }

      .Create-Account:hover {
        background: #000;
        color: #fff;
      }
      .gender-container {
        background-color: transparent;
        width: 150px;
        height: 40px;
        perspective: 1000px;
        display: flex;
        flex-direction: row;
        flex-shrink: 0;
        gap: 10px;
      }
      .gender-box {
        position: relative;
        width: 100%;
        height: 100%;
        text-align: center;
        transition: 0.8s;
        transform-style: preserve-3d;
        cursor: pointer;
      }
      .gender-box:hover {
        transform: rotateY(180deg);
      }
      .male-front,
      .male-back {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        backface-visibility: hidden;
      }
      .male-front {
        background-color: #fff;
        color: black;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 14px;
      }
      .male-back {
        background-color: #007bff;
        color: white;
        transform: rotateY(180deg);
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 14px;
      }
      .male-back svg {
        width: 15px;
        height: 15px;
      }
      .change-to-log {
        position: absolute;
        display: flex;
        width: 70px;
        height: 30px;
        background-color: rgb(255, 255, 255);
        top: 10px;
        right: 10px;
        justify-content: center;
        align-items: center;
        font-size: 30px;
        text-align: center;
        color: black;
        transition: 0.4s;
        overflow: hidden;
        border-radius: 10px;
        cursor: pointer;
      }
      .change-to-log-line::before {
        content: "";
        width: 100%;
        height: 100%;
        position: absolute;
        background: #000;
        left: 0;
        color: white;
        bottom: -100%;
        transition: 0.4s;
        z-index: 1;
      }
      .change-to-log:hover .change-to-log-line::before,
      .change-to-log:focus .change-to-log-line::before {
        bottom: 0;
      }

      .change-to-log:hover .btn-text,
      .change-to-log:focus .btn-text {
        color: #fff;
      }
      .change-to-log:hover .LoginArrow,
      .change-to-log:focus  .LoginArrow{
          z-index: 2;
      }
      .change-to-log:hover .change-to-log-line svg,
      .change-to-log:focus  .change-to-log-line svg{
          z-index: 2;
      }
      .LoginArrow {
        width: 20px;
        height: 20px;
        margin-top: -15px;
        position: absolute;
        z-index: 1;
      }
      .change-to-log-line svg{
        position: absolute;
        z-index: 1;
        text-align: center;
        top: 6px;
        left: 25px;
        width: 20px;
        height: 20px;
      }
    </style>
  </head>
  <body>

          <div class="input-group">
            <input type="text" required />

            <span class="bar"></span>

          <button class="Create-Account">Create Account</button>

      </form>

    </div>
  </body>
</html>
