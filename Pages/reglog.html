<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trinity Style - Auth</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        font-family: "Montserrat", sans-serif;
        overflow: hidden;
      }

      .banner {
        position: relative;
        width: 100vw;
        height: 100vh;
        background: url("../Pictures/Banners/banner_yellow.png") no-repeat
          center;
        background-size: cover;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .info-box {
        position: relative;
        width: 250px;
        height: 100vh;
        padding: 0 50px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        z-index: 10;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(15px);
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.1);
      }

      .login-box {
        background: rgba(0, 0, 0, 0.05);
        border-left: 1px solid rgba(255, 255, 255, 0.2);
      }

      .brand-header {
        margin-bottom: 40px;
      }
      .brand-header h2 {
        font-weight: 600;
        font-size: 28px;
        margin: 0;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      .brand-header p {
        font-size: 13px;
        color: #333;
        margin-top: 5px;
      }

      .input-group {
        position: relative;
        margin-bottom: 30px;
        width: 100%;
      }
      .input-group input {
        font-size: 15px;
        padding: 10px 0;
        display: block;
        width: 100%;
        border: none;
        border-bottom: 1.5px solid #000;
        background: transparent;
        outline: none;
      }
      .input-group label {
        color: #000;
        font-size: 14px;
        position: absolute;
        pointer-events: none;
        left: 0;
        top: 10px;
        transition: 0.3s ease all;
      }
      .input-group input:focus ~ label,
      .input-group input:valid ~ label {
        top: -18px;
        font-size: 12px;
        font-weight: 600;
      }

      .gender-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 10px;
        display: block;
      }
      .gender-container {
        display: flex;
        gap: 10px;
        margin-bottom: 25px;
      }
      .gender-box {
        position: relative;
        flex: 1;
        height: 40px;
        perspective: 1000px;
        cursor: pointer;
      }
      .male-front,
      .male-back {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 4px;
        backface-visibility: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 12px;
        transition: 0.6s;
        border: 1px solid rgba(0, 0, 0, 0.1);
      }
      .male-front {
        background: #fff;
        color: #000;
      }
      .male-back {
        transform: rotateY(180deg);
        color: #fff;
        font-weight: bold;
      }
      .gender-box:hover .male-front {
        transform: rotateY(180deg);
      }
      .gender-box:hover .male-back {
        transform: rotateY(360deg);
      }

      .btn-action {
        background: #000;
        color: #fff;
        border: 1px solid #000;
        padding: 15px;
        width: 100%;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 2px;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
      }
      .btn-action:hover {
        background: #b8860b;
        border-color: #b8860b;
      }

      .extra-link {
        margin-top: 20px;
        text-align: center;
        font-size: 12px;
      }
      .extra-link a {
        color: #000;
        font-weight: 600;
        text-decoration: none;
      }

      @media (max-width: 850px) {
        .banner {
          flex-direction: column;
          overflow-y: auto;
          justify-content: flex-start;
        }
        .info-box {
          width: 100%;
          height: auto;
          padding: 50px 20px;
        }
      }
      .login-link {
        margin-top: 25px;
        text-align: center;
        font-size: 13px;
      }

      .login-link a {
        color: #000;
        font-weight: 600;
        text-decoration: none;
        border-bottom: 1px solid #000;
      }
    </style>
  </head>
  <body>
    <div class="banner">
      <form action="register.php" method="POST">
        <div class="info-box">
          <div class="brand-header">
            <h2>Register</h2>
            <p>Tạo tài khoản mới tại Trinity.</p>
          </div>
          <div class="input-group">
            <input type="text" required />
            <label>Username</label>
          </div>
          <div class="input-group">
            <input type="password" required />
            <label>Password</label>
          </div>
          <span class="gender-label">Giới tính</span>
          <div class="gender-container">
            <div class="gender-box">
              <div class="male-front">Male</div>
              <div class="male-back" style="background-color: #333">Male</div>
            </div>
            <div class="gender-box">
              <div class="male-front">Female</div>
              <div class="male-back" style="background-color: #b8860b">
                Female
              </div>
            </div>
            <div class="gender-box">
              <div class="male-front">Other</div>
              <div class="male-back" style="background-color: #888">Other</div>
            </div>
          </div>
          <div class="input-group">
            <input type="text" required />
            <label>Email or Phone</label>
          </div>
          <button type="submit" class="btn-action">Create Account</button>
          <div class="login-link">
            Đã có tài khoản? <a href="#">Đăng nhập</a>
          </div>
        </div>
      </form>

      <form action="login.php" method="POST">
        <div class="info-box login-box">
          <div class="brand-header">
            <h2>Login</h2>
            <p>Chào mừng bạn trở lại.</p>
          </div>
          <div class="input-group">
            <input type="text" required />
            <label>Username / Email</label>
          </div>
          <div class="input-group">
            <input type="password" required />
            <label>Password</label>
          </div>
          <button type="submit" class="btn-action">Sign In</button>
          <div class="extra-link">
            <a href="#">Quên mật khẩu?</a>
            <div class="login-link">
            Chưa có tài khoản? <a href="#">Đăng kí</a>
          </div>
          </div>
        </div>
      </form>
    </div>
  </body>
</html>
