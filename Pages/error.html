<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>404 - Error</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    @keyframes wave {
      0% { transform: translateX(0) translateZ(0) scaleY(1); }
      50% { transform: translateX(-25%) translateZ(0) scaleY(0.85); }
      100% { transform: translateX(-50%) translateZ(0) scaleY(1); }
    }
    .wave-animation {
      animation: wave 25s cubic-bezier(0.36, 0.45, 0.63, 0.53) infinite;
      transform-origin: bottom;
    }
    .wave-fast {
      animation: wave 18s cubic-bezier(0.36, 0.45, 0.63, 0.53) infinite;
    }
    html, body {
      max-width: 100%;
      overflow-x: hidden;
    }
  </style>
</head>
<body class="bg-[#fafafa] text-[#111111] min-h-screen flex flex-col justify-between font-serif antialiased select-none overflow-x-hidden relative">

  <header class="w-full px-6 sm:px-8 py-6 flex justify-between items-center z-50 mix-blend-difference">
    <a href="#" class="font-sans text-xs sm:text-sm tracking-[0.3em] uppercase font-bold text-neutral-800 hover:opacity-50 transition-opacity">
      Trinity
    </a>
    <div class="flex gap-6 font-sans text-xs sm:text-sm tracking-widest uppercase text-neutral-500">
      <a href="#" class="hover:text-neutral-900 transition-colors">Home</a>
      <a href="#" class="hover:text-neutral-900 transition-colors">Contact</a>
    </div>
  </header>

  <main class="flex-1 flex flex-col items-center justify-center text-center px-6 z-40 relative">
    
    <span class="font-sans text-7xl sm:text-[100px] md:text-[140px] font-extralight tracking-[0.1em] text-neutral-200/70 leading-none select-none">
      404
    </span>

    <h2 class="font-sans text-[10px] sm:text-xs md:text-sm tracking-[0.4em] uppercase font-medium text-neutral-400 mt-4">
      Not Found!
    </h2>
    
    <h1 class="text-sm sm:text-xl md:text-2xl lg:text-3xl font-light tracking-[0.12em] sm:tracking-[0.15em] max-w-xl text-neutral-800 leading-relaxed mt-4 sm:mt-6 mb-6 sm:mb-8">
      We sincerely apologize for this inconvenience. The page you are seeking is temporarily unavailable.
    </h1>

    <a href="#" class="group relative font-sans text-[10px] sm:text-xs tracking-[0.3em] uppercase inline-block py-2.5 px-6 sm:py-3 sm:px-8 overflow-hidden border border-neutral-300 hover:border-black transition-colors duration-500">
      <span class="relative z-10 text-neutral-600 group-hover:text-white transition-colors duration-500">Return to Origin</span>
      <span class="absolute inset-0 bg-black translate-y-full group-hover:translate-y-0 transition-transform duration-500 ease-out"></span>
    </a>

  </main>

  <footer class="w-full h-44 sm:h-56 md:h-64 relative z-30 pointer-events-none overflow-hidden">
    
    <div class="absolute inset-x-0 bottom-0 w-[400%] sm:w-[200%] h-full">
      
      <svg class="wave-animation wave-fast absolute bottom-0 w-full h-full opacity-40" viewBox="0 0 1200 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,60 C150,90 350,30 500,60 C650,90 850,30 1000,60 C1150,90 1350,30 1500,60 C1650,90 1850,30 2000,60 L2000,120 L0,120 Z" 
              fill="#e3e3e3" stroke="#d4d4d4" stroke-width="0.5"/>
      </svg>

      <svg class="wave-animation absolute bottom-0 w-full h-[85%] opacity-60" viewBox="0 0 1200 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,50 C200,20 300,80 500,50 C700,20 800,80 1000,50 C1200,20 1300,80 1500,50 C1700,20 1800,80 2000,50 L2000,120 L0,120 Z" 
              fill="#ececec" stroke="#dadada" stroke-width="0.5"/>
      </svg>

      <svg class="wave-animation wave-fast absolute bottom-0 w-full h-[70%] opacity-90" viewBox="0 0 1200 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,40 C100,70 400,20 500,40 C600,60 900,20 1000,40 C1100,60 1400,20 1500,40 C1600,60 1900,20 2000,40 L2000,120 L0,120 Z" 
              fill="#f4f4f4" stroke="#dfdfdf" stroke-width="0.5"/>
      </svg>
    </div>

    <div class="absolute bottom-4 left-6 sm:left-8 font-sans text-[9px] sm:text-[10px] tracking-widest uppercase text-neutral-400">
      &copy; 2026 All Rights Reserved.
    </div>
  </footer>

</body>
</html>
